<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --ink:#1a1208; --ink2:#110e07; --parchment:#f5efe3;
  --stone:#9e9485; --accent:#c8521a; --gold:#c9982a;
  --moss:#4a6741; --green:#7ec86e;
  --bar:56px; --peek:76px; --safe:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);overflow:hidden;overscroll-behavior:none;}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--bar);background:var(--ink);border-bottom:1px solid rgba(200,170,100,0.15);display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:500;}
.logo-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--parchment);}
.logo-sub{font-size:0.58rem;color:var(--stone);letter-spacing:0.15em;text-transform:uppercase;margin-top:1px;}
.trail-count{background:rgba(200,170,100,0.12);border:1px solid rgba(200,170,100,0.25);border-radius:20px;padding:5px 12px;font-size:0.72rem;font-weight:600;color:var(--gold);}

/* FILTRI */
#filters{position:fixed;top:var(--bar);left:0;right:0;height:52px;display:flex;align-items:center;gap:8px;padding:0 16px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:400;pointer-events:all;}
#filters::-webkit-scrollbar{display:none;}
.fp{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:24px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(26,18,8,0.9);color:var(--stone);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;white-space:nowrap;min-height:40px;backdrop-filter:blur(8px);transition:all 0.2s;}
.fp.a-all{background:rgba(201,152,42,0.2);border-color:var(--gold);color:var(--gold);}
.fp.a-easy{background:rgba(74,103,65,0.3);border-color:var(--green);color:var(--green);}
.fp.a-med{background:rgba(201,152,42,0.2);border-color:var(--gold);color:var(--gold);}
.fp.a-hard{background:rgba(200,82,26,0.25);border-color:var(--accent);color:var(--accent);}

/* MAPPA */
#map{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1;}

/* BOTTOM SHEET */
#sheet{position:fixed;left:0;right:0;bottom:0;background:var(--ink2);border-radius:20px 20px 0 0;box-shadow:0 -4px 32px rgba(0,0,0,0.5);z-index:300;height:75vh;transform:translateY(calc(75vh - var(--peek) - var(--safe)));transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);will-change:transform;}
#sheet.open{transform:translateY(0);}
#sh-handle{display:flex;flex-direction:column;align-items:center;padding:12px 0 10px;cursor:pointer;user-select:none;}
#sh-bar{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);margin-bottom:7px;}
#sh-label{font-size:0.7rem;font-weight:600;color:var(--stone);letter-spacing:0.08em;text-transform:uppercase;}
#trail-list{overflow-y:auto;-webkit-overflow-scrolling:touch;height:calc(75vh - 58px);padding:4px 0 calc(20px + var(--safe));}
#trail-list::-webkit-scrollbar{display:none;}
.trow{display:flex;align-items:center;padding:14px 18px;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;min-height:70px;transition:background 0.15s;}
.trow:active{background:rgba(255,255,255,0.06);}
.trow.dim{opacity:0.2;}
.tbar{width:4px;height:38px;border-radius:2px;flex-shrink:0;}
.tinfo{flex:1;min-width:0;}
.tname{font-size:0.9rem;font-weight:600;color:var(--parchment);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.tmeta{display:flex;gap:10px;font-size:0.72rem;color:var(--stone);}
.chip{font-size:0.6rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:4px 9px;border-radius:8px;flex-shrink:0;align-self:center;}
.c-easy{background:rgba(74,103,65,0.3);color:var(--green);}
.c-med{background:rgba(201,152,42,0.2);color:var(--gold);}
.c-hard{background:rgba(200,82,26,0.22);color:var(--accent);}

/* DETAIL CARD */
#detail{position:fixed;left:0;right:0;bottom:0;background:var(--ink2);border-radius:20px 20px 0 0;box-shadow:0 -4px 40px rgba(0,0,0,0.65);z-index:600;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);will-change:transform;}
#detail.open{transform:translateY(0);}
#dh{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 18px 12px;border-bottom:1px solid rgba(255,255,255,0.07);}
#dstrip{width:4px;border-radius:2px;flex-shrink:0;margin-right:12px;align-self:stretch;min-height:42px;}
#dtitles{flex:1;}
#dtype{font-size:0.58rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--stone);margin-bottom:3px;}
#dname{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--parchment);line-height:1.25;}
#dsub{font-size:0.78rem;color:var(--stone);margin-top:2px;}
#btnx{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:var(--stone);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
#btnx:active{background:rgba(255,255,255,0.16);}
#dstats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid rgba(255,255,255,0.07);}
.sc{padding:13px 6px;text-align:center;border-right:1px solid rgba(255,255,255,0.06);}
.sc:last-child{border-right:none;}
.si{font-size:1rem;display:block;margin-bottom:3px;}
.sv{font-size:0.85rem;font-weight:600;color:var(--parchment);display:block;}
.sl{font-size:0.56rem;color:var(--stone);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-top:2px;}
#ddesc{padding:14px 18px;font-size:0.8rem;color:var(--stone);line-height:1.6;border-bottom:1px solid rgba(255,255,255,0.07);}
#btndl{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 18px calc(14px + var(--safe));padding:16px;background:var(--accent);color:white;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;text-decoration:none;min-height:54px;transition:opacity 0.2s;}
#btndl:active{opacity:0.8;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity 0.4s;}
#loading.hidden{opacity:0;pointer-events:none;}
.spinner{width:36px;height:36px;border:3px solid rgba(200,170,100,0.15);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:0.8rem;color:var(--stone);}

/* OVERLAY */
#ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.3);display:none;}
#ov.on{display:block;}

/* LEAFLET */
.leaflet-container{background:#2a2317;}
.leaflet-control-zoom{margin-bottom:calc(var(--peek) + 20px + var(--safe)) !important;}
.leaflet-control-attribution{background:rgba(26,18,8,0.8) !important;color:var(--stone) !important;font-size:0.55rem !important;}
.leaflet-control-attribution a{color:var(--gold) !important;}
.leaflet-bar a{background:var(--ink2) !important;color:var(--parchment) !important;border-color:rgba(200,170,100,0.2) !important;width:40px !important;height:40px !important;line-height:40px !important;font-size:1.1rem !important;}
</style>
</head>

const DL={easy:'Facile',med:'Medio',hard:'Difficile'};
const DC={easy:'c-easy',med:'c-med',hard:'c-hard'};
let filter='all', map, sheetOpen=false;

window.addEventListener('load',()=>{
  document.getElementById('loading').classList.add('hidden');

  map=L.map('map',{center:[42.30,12.05],zoom:9,tap:true,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
  }).addTo(map);

  trails.forEach(t=>{
    t._line=L.polyline(t.coords,{color:t.color,weight:5,opacity:0.9,smoothFactor:1}).addTo(map);
    t._line.on('click',()=>{closeSheet();openDetail(t);});
  });

  buildList();

  document.getElementById('sh-handle').addEventListener('click',toggleSheet);
  document.getElementById('btnx').addEventListener('click',closeDetail);
  document.getElementById('ov').addEventListener('click',()=>{closeDetail();closeSheet();});

  document.querySelectorAll('.fp').forEach(b=>{
    b.addEventListener('click',()=>{
      filter=b.dataset.f;
      document.querySelectorAll('.fp').forEach(x=>x.className='fp');
      b.classList.add('a-'+filter);
      applyFilter();
    });
  });
});

function buildList(){
  const l=document.getElementById('trail-list');
  l.innerHTML='';
  trails.forEach(t=>{
    const r=document.createElement('div');
    r.className='trow'; r.id='r'+t.id;
    r.innerHTML=`<div class="tbar" style="background:${t.color}"></div>
      <div class="tinfo">
        <div class="tname">${t.name}</div>
        <div class="tmeta"><span>📏 ${t.km} km</span><span>⛰️ ${t.elev}</span><span>⏱️ ${t.time}</span></div>
      </div>
      <div class="chip ${DC[t.diff]}">${DL[t.diff]}</div>`;
    r.addEventListener('click',()=>{
      closeSheet();
      map.fitBounds(t._line.getBounds(),{padding:[60,60]});
      setTimeout(()=>openDetail(t),400);
    });
    l.appendChild(r);
  });
}

function applyFilter(){
  let n=0;
  trails.forEach(t=>{
    const ok=filter==='all'||t.diff===filter;
    document.getElementById('r'+t.id)?.classList.toggle('dim',!ok);
    t._line.setStyle({opacity:ok?0.9:0.08,weight:ok?5:2});
    if(ok)n++;
  });
  document.getElementById('cnt').textContent=n+' percorsi';
}

function toggleSheet(){sheetOpen?closeSheet():openSheet();}
function openSheet(){
  sheetOpen=true;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('ov').classList.add('on');
  document.getElementById('sh-label').textContent='Tocca per chiudere';
}
function closeSheet(){
  sheetOpen=false;
  document.getElementById('sheet').classList.remove('open');
  if(!document.getElementById('detail').classList.contains('open'))
    document.getElementById('ov').classList.remove('on');
  document.getElementById('sh-label').textContent='Scorri per i percorsi';
}

function openDetail(t){
  trails.forEach(x=>x._line.setStyle({weight:4,opacity:0.5}));
  t._line.setStyle({weight:7,opacity:1});
  document.getElementById('dstrip').style.background=t.color;
  document.getElementById('dtype').textContent=t.type;
  document.getElementById('dname').textContent=t.name;
  document.getElementById('dsub').textContent=t.sub||'';
  document.getElementById('d-km').textContent=t.km+' km';
  document.getElementById('d-el').textContent=t.elev;
  document.getElementById('d-t').textContent=t.time;
  document.getElementById('d-df').textContent=DL[t.diff];
  document.getElementById('ddesc').textContent=t.desc;
  document.getElementById('btndl').href=t.file;
  document.getElementById('btndl').download=t.file.split('/').pop();
  document.getElementById('detail').classList.add('open');
  document.getElementById('ov').classList.add('on');
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  document.getElementById('ov').classList.remove('on');
  trails.forEach(t=>{
    const ok=filter==='all'||t.diff===filter;
    t._line.setStyle({weight:5,opacity:ok?0.9:0.08});
  });
}
</script>
</body>
</html>
